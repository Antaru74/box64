name: Build Box64 for Termux Only

on:
  workflow_dispatch:  # Jalankan manual
  push:
    branches: [ main, master ]
    paths:
      - "**/*.c"
      - "**/*.h"
      - "**/*.S"
      - "CMakeLists.txt"

jobs:
  build-termux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Box64 Repository
        uses: actions/checkout@v4

      - name: Environment Preparation for Termux
        run: |
          sudo apt-get update
          sudo apt-get -y install git cmake make python3 patchelf p7zip-full
          
          # Download Android NDK
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -qq android-ndk-r26b-linux.zip
          echo "BOX64_COMPILER=$PWD/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang" >> $GITHUB_ENV
          echo "BOX64_PLATFORM_MACRO=-DANDROID=1 -DARM_DYNAREC=1 -DBAD_SIGNAL=1" >> $GITHUB_ENV
          
          # Setup Termux Docker environment
          git clone https://github.com/termux/termux-docker.git
          cd termux-docker
          git checkout 148b93d989cbc572719e050135b3e13f115f2a8e~1
          cd ..
          sudo cp -rf termux-docker/system/arm /system
          sudo chown -R $(whoami):$(whoami) /system
          sudo chmod 755 -R /system
          
          # Download libandroid-sysv-semaphore untuk Termux
          wget https://packages.termux.dev/apt/termux-main/pool/main/liba/libandroid-sysv-semaphore/libandroid-sysv-semaphore_0.1-1_aarch64.deb
          7z x libandroid-sysv-semaphore_0.1-1_aarch64.deb
          tar -xf data.tar.xz
          sudo cp -rf data /
          sudo chmod 755 -R /data
          sudo chown -R $(whoami):$(whoami) /data
          
          # Set environment variables untuk Termux
          echo "CFLAGS=-L/data/data/com.termux/files/usr/lib" >> $GITHUB_ENV
          echo "IS_TERMUX=1" >> $GITHUB_ENV
          echo "BOX64_BUILD_TYPE=Release" >> $GITHUB_ENV
          echo "BOX64_HAVE_TRACE=0" >> $GITHUB_ENV

      - name: Build Box64 for Termux
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=${{ env.BOX64_COMPILER }} \
            -DTERMUX=${{ env.IS_TERMUX }} \
            ${{ env.BOX64_PLATFORM_MACRO }} \
            -DCMAKE_BUILD_TYPE=${{ env.BOX64_BUILD_TYPE }} \
            -DHAVE_TRACE=${{ env.BOX64_HAVE_TRACE }} \
            -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON \
            -DCI=1
          make -j$(nproc) VERBOSE=1

      - name: Test Box64 (Optional)
        run: |
          cd build
          # Install QEMU untuk testing
          mkdir qemu10
          wget -O- -q https://archive.archlinux.org/packages/q/qemu-user-static/qemu-user-static-10.0.0-7-x86_64.pkg.tar.zst | tar -I zstd -C qemu10 -xf -
          sudo cp qemu10/usr/bin/* /usr/bin/
          
          export INTERPRETER=qemu-aarch64-static
          export QEMU_SET_ENV=LD_LIBRARY_PATH=/data/data/com.termux/files/usr/lib 
          export QEMU_LD_PREFIX=/system/lib64:/data/data/com.termux/files/usr/lib
          
          # Jalankan test (skip jika ingin lebih cepat)
          ctest -j$(nproc) --timeout 300 --output-on-failure || echo "Tests failed but continuing"

      - name: Get Git Commit Short ID
        id: git-info
        run: echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Upload Box64 Binary
        uses: actions/upload-artifact@v4
        with:
          name: box64-termux-${{ env.SHORT_COMMIT }}
          path: build/box64
          retention-days: 30

      - name: Upload Box64 Binary (as latest)
        uses: actions/upload-artifact@v4
        with:
          name: box64-termux-latest
          path: build/box64
          retention-days: 30
