name: Build Box64 for Termux Native

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-box64-termux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64]  # Termux native hanya untuk ARM64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: ptitSeb/box64
        fetch-depth: 1

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d
        add-to-path: false

    - name: Setup Termux Environment
      run: |
        # Install dependencies untuk Termux build
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          make \
          clang \
          git \
          wget

    - name: Configure CMake for Termux
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DTERMUX=1 \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DARM_DYNAREC=ON \
          -DBAD_SIGNAL=ON \
          -DNOGIT=1

    - name: Build Box64
      run: |
        cd build
        make -j$(nproc)

    - name: Prepare artifacts for Termux
      run: |
        cd build
        # Strip binary untuk mengurangi ukuran
        llvm-strip box64
        
        # Buat package sederhana untuk Termux
        mkdir -p box64-termux-package
        cp box64 box64-termux-package/
        
        # Buat script instalasi
        cat > box64-termux-package/install.sh << 'EOF'
        #!/data/data/com.termux/files/usr/bin/bash
        echo "Installing Box64 for Termux..."
        cp box64 $PREFIX/bin/
        chmod +x $PREFIX/bin/box64
        echo "Box64 installed successfully!"
        echo "Note: Box64 in native Termux is experimental and won't run Linux binaries!"
        EOF
        
        chmod +x box64-termux-package/install.sh
        
        # Buat README
        cat > box64-termux-package/README.md << 'EOF'
        # Box64 for Termux Native
        
        Ini adalah build Box64 untuk Termux native (experimental).
        
        ## Instalasi
        1. Extract archive ini di Termux
        2. Jalankan `bash install.sh`
        
        ## Peringatan
        Box64 di Termux native bersifat experimental dan TIDAK akan bisa menjalankan binary Linux biasa.
        
        ## Requirements
        - libandroid-sysv-semaphore
        - libandroid-spawn
        
        Install requirements:
        ```bash
        pkg install libandroid-sysv-semaphore libandroid-spawn
        ```
        EOF

    - name: Create Termux package archive
      run: |
        cd build
        tar -czf box64-termux-native.tar.gz box64-termux-package/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: box64-termux-native
        path: build/box64-termux-native.tar.gz
        compression-level: 0

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: box64-binary
        path: build/box64
        compression-level: 0
